name: Update Playlist
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download and commit
        env:
          M3U_URL: ${{ secrets.M3U_SOURCE_URL }}
        run: |
          curl -fsSL --retry 3 --retry-delay 5 --max-time 60 -A "VLC/3.0 LibVLC/3.0" "$M3U_URL" -o playlist.m3u
          head -1 playlist.m3u | grep -q '#EXTM3U' || (echo "Gecersiz M3U" && exit 1)
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add playlist.m3u
          git diff --staged --quiet && echo "no change" && exit 0
          git commit -m "update: playlist güncellendi"
          git push
